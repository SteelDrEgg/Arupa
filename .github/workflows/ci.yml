name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "Dockerfile"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "cmd/**"
      - "internal/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

#      - name: Test
#        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos:
          - linux
#          - darwin
        goarch:
        # idk why amd64 gives API rate limit exceeded all the time when run arduino/setup-protoc@v3
        # it should be fine if arm64 is fine
#          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Install proto tools
        run: make tools

      - name: Build
        run: make build VERSION=${{ github.sha }} DIST_DIR=dist/${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: arupa-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.sha }}
          path: dist/${{ matrix.goos }}-${{ matrix.goarch }}/arupa
          if-no-files-found: error
          retention-days: 14

  container:
    name: Build container image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          push: false
          build-args: |
            VERSION=${{ github.sha }}
          tags: arupa:ci
