syntax = "proto3";

package arupa.service.v2;

option go_package = "github.com/SteelDrEgg/arupa-sdk/golang/gen/grpc;servicev2";

message User {
  string username = 1;
  repeated string groups = 2;
}

message AccessPolicy {
  bool require_auth = 1;
  repeated string groups = 2;
}

message Header {
  string name = 1;
  repeated string values = 2;
}

message HTTPRequest {
  string route_id = 1;
  string route_pattern = 2;
  string method = 3;
  string path = 4;
  string query = 5;
  repeated Header headers = 6;
  bytes body = 7;
  string remote_addr = 8;
  User user = 9;
}

message HTTPResponse {
  int32 status = 1;
  repeated Header headers = 2;
  bytes body = 3;
}

message SocketEvent {
  string route_id = 1;
  string namespace = 2;
  string event = 3;
  string socket_id = 4;
  bytes payload = 5;
  User user = 6;
}

message EmitInstruction {
  string namespace = 1;
  string target = 2;
  string event = 3;
  bytes payload = 4;
}

message SocketEventReply {
  repeated EmitInstruction emits = 1;
}

message InheritedListener {
  string id = 1;
  uint32 fd = 2;
  string network = 3;
  string address = 4;
}

message RegisterRequest {
  string instance_id = 1;
  map<string, string> params = 2;
  repeated InheritedListener listeners = 3;
  // A github.com/hashicorp/go-plugin GRPCBroker stream served by the kernel.
  // gRPC services dial this ID through their broker to call Host.*.
  uint32 host_broker_id = 4;
}

message RegisterReply {
  string name = 1;
  string version = 2;
}

enum TransportType {
  TRANSPORT_TYPE_UNSPECIFIED = 0;
  TRANSPORT_TYPE_STATIC = 1;
  TRANSPORT_TYPE_HTTP = 2;
  TRANSPORT_TYPE_SOCKET_IO = 3;
  TRANSPORT_TYPE_PROXY = 4;
}

enum ProxyNetwork {
  PROXY_NETWORK_UNSPECIFIED = 0;
  PROXY_NETWORK_INHERITED = 1;
  PROXY_NETWORK_UNIX = 2;
  PROXY_NETWORK_TCP = 3;
}

message StaticTransport {
  string source = 1;
}

message ProxyTransport {
  ProxyNetwork network = 1;
  string address = 2;
  string scheme = 3;
}

message Transport {
  string id = 1;
  TransportType type = 2;
  oneof config {
    StaticTransport static = 3;
    ProxyTransport proxy = 4;
  }
}

message HTTPRoute {
  string method = 1;
  string pattern = 2;
  AccessPolicy access = 3;
}

message SocketIORoute {
  string namespace = 1;
  repeated string events = 2;
  AccessPolicy access = 3;
  map<string, AccessPolicy> event_access = 4;
}

message Route {
  string id = 1;
  string transport_id = 2;
  oneof route {
    HTTPRoute http = 3;
    SocketIORoute socket_io = 4;
  }
}

message RegisterTransportRequest {
  Transport transport = 1;
}

message UnregisterTransportRequest {
  string id = 1;
}

message RegisterRoutesRequest {
  repeated Route routes = 1;
}

message UnregisterRoutesRequest {
  repeated string ids = 1;
}

message RegistrationFailure {
  string id = 1;
  string error = 2;
}

message RegistrationReply {
  repeated string registered = 1;
  repeated RegistrationFailure failures = 2;
  bool degraded = 3;
  string error = 4;
}

message KVGetRequest {
  string namespace = 1;
  string key = 2;
}
message KVGetReply {
  bool found = 1;
  bytes value = 2;
}
message KVSetRequest {
  string namespace = 1;
  string key = 2;
  bytes value = 3;
}
message KVSetReply { string error = 1; }
message KVDeleteRequest {
  string namespace = 1;
  string key = 2;
}
message KVDeleteReply { string error = 1; }
message KVListRequest { string namespace = 1; }
message KVListReply { repeated string keys = 1; }

message EmitReply { string error = 1; }

message ParamsGetRequest {}
message ParamsGetReply {
  map<string, string> params = 1;
  string error = 2;
}

message ParamsPatchRequest {
  map<string, string> set = 1;
  repeated string delete = 2;
}
message ParamsPatchReply { string error = 1; }

message ServiceMessage {
  string source = 1;
  string target = 2;
  string topic = 3;
  bytes payload = 4;
}

message ServiceMessageReply {
  string error = 1;
  string message = 2;
}

message LogRequest {
  string level = 1;
  string message = 2;
}
message LogReply {}

// go:plugin type=plugin version=2
service Service {
  rpc Register(RegisterRequest) returns (RegisterReply);
  rpc HandleHTTP(HTTPRequest) returns (HTTPResponse);
  rpc HandleSocketEvent(SocketEvent) returns (SocketEventReply);
  rpc HandleServiceMessage(ServiceMessage) returns (ServiceMessageReply);
}

// go:plugin type=host
service Host {
  rpc KVGet(KVGetRequest) returns (KVGetReply);
  rpc KVSet(KVSetRequest) returns (KVSetReply);
  rpc KVDelete(KVDeleteRequest) returns (KVDeleteReply);
  rpc KVList(KVListRequest) returns (KVListReply);
  rpc GetParams(ParamsGetRequest) returns (ParamsGetReply);
  rpc PatchParams(ParamsPatchRequest) returns (ParamsPatchReply);
  rpc Emit(EmitInstruction) returns (EmitReply);
  rpc SendServiceMessage(ServiceMessage) returns (ServiceMessageReply);
  rpc RegisterTransport(RegisterTransportRequest) returns (RegistrationReply);
  rpc UnregisterTransport(UnregisterTransportRequest) returns (RegistrationReply);
  rpc RegisterRoutes(RegisterRoutesRequest) returns (RegistrationReply);
  rpc UnregisterRoutes(UnregisterRoutesRequest) returns (RegistrationReply);
  rpc Log(LogRequest) returns (LogReply);
}
